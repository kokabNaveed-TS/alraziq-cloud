services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: alraziq_frontend
    restart: always

    depends_on:
      - backend

    labels:
      - "traefik.enable=true"

      # IMPORTANT
      - "traefik.docker.network=traefik"

      # Frontend ONLY (exclude API)
      - "traefik.http.routers.alraziq_frontend.rule=Host(`dashboard.techscapesolution.com`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.alraziq_frontend.priority=1"
      - "traefik.http.routers.alraziq_frontend.entrypoints=websecure"
      - "traefik.http.routers.alraziq_frontend.tls=true"
      - "traefik.http.routers.alraziq_frontend.tls.certresolver=production"

      # Nginx inside frontend container
      - "traefik.http.services.alraziq_frontend.loadbalancer.server.port=80"

    networks:
      - kingsleys_network
      - mysql_default
      - traefik


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: alraziq_backend
    restart: always

    env_file:
      - ./backend/.env

    labels:
      - "traefik.enable=true"

      - "traefik.docker.network=traefik"

      # API routing
      - "traefik.http.routers.alraziq_backend.rule=Host(`dashboard.techscapesolution.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.alraziq_backend.priority=100"
      - "traefik.http.routers.alraziq_backend.entrypoints=websecure"
      - "traefik.http.routers.alraziq_backend.tls=true"
      - "traefik.http.routers.alraziq_backend.tls.certresolver=production"

      # Express port
      - "traefik.http.services.alraziq_backend.loadbalancer.server.port=5000"

    networks:
      - kingsleys_network
      - mysql_default
      - traefik


networks:
  kingsleys_network:
    driver: bridge

  mysql_default:
    external: true

  traefik:
    external: true